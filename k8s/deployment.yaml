apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-demo
spec:
  replicas: 5
  selector:
    matchLabels:
      app: k8s-demo
  template:
    metadata:
      labels:
        app: k8s-demo
    spec:
      containers:
        - name: k8s-demo
          image: bharani27/k8s-demo:7f09b23bf8872d644cfb95e91ceec03bfafe0d4f
          ports:
            - containerPort: 3000